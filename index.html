<style>
:root{
  --bg:#0F0D0C;--surface:#171413;--raised:#201C1A;--border:#2D2826;--muted:#4A4340;
  --amber:#E07A35;--amber-press:#B85C1E;--amber-hover:#F0A468;
  --text:#F5F0EA;--text-2:#A8A09B;
  --ok:#6E8257;--err:#C4453C;--warn:#D9A441;
  --paper:#F5F0EA;--paper-2:#E7E0D7;--ink:#201C1A;--ink-2:#6B615B;--ink-line:#D6CDC2;
  --ff-d:'Space Grotesk',system-ui,sans-serif;--ff-b:'Inter',system-ui,sans-serif;--ff-m:'DM Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input{font:inherit}
::selection{background:var(--amber);color:#0F0D0C}
.mark path{fill:currentColor;stroke:currentColor;stroke-width:11;stroke-linejoin:round}
.wm{display:flex;flex-direction:column;line-height:1}
.wm b{font-family:var(--ff-d);font-weight:700;font-size:15px;letter-spacing:-.02em}
.wm s{font-family:var(--ff-d);font-weight:500;font-size:9px;letter-spacing:.42em;text-decoration:none;color:var(--text-2);margin-top:2px}
.hide{display:none!important}

.auth-box{width:100%;max-width:380px}
.auth-brand{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:30px}
.auth-brand .mark{width:44px;height:56px;color:var(--text)}
.auth-brand .wm{align-items:center}
.auth-brand .wm b{font-size:22px}
.auth-brand .wm s{font-size:11px}
.auth-h{font-family:var(--ff-d);font-weight:700;font-size:23px;letter-spacing:-.025em;margin-bottom:5px}
.auth-p{color:var(--text-2);font-size:13.5px;margin-bottom:22px}
.fld{margin-bottom:11px}
.fld label{display:block;font-family:var(--ff-m);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-2);margin-bottom:6px}
.fld input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:14px;color:var(--text);font-size:15px;outline:none;transition:.15s}
.fld input:focus{border-color:var(--muted);background:var(--raised)}
.fld.bad input{border-color:var(--err)}
.picks{display:grid;gap:8px}
.pick{display:flex;align-items:center;gap:12px;text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:13px 14px;transition:.15s}
.pick.on{border-color:var(--amber);background:var(--raised)}
.pick .r{width:19px;height:19px;flex:none;border-radius:50%;border:2px solid var(--muted);display:grid;place-items:center}
.pick.on .r{border-color:var(--amber)}
.pick.on .r::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--amber)}
.pick b{display:block;font-size:14.5px;font-weight:600}
.pick small{color:var(--text-2);font-size:12px}
.btn{width:100%;padding:15px;border-radius:12px;font-family:var(--ff-d);font-weight:700;font-size:14.5px;letter-spacing:.04em;text-transform:uppercase;background:var(--amber);color:#170F08;box-shadow:0 3px 0 var(--amber-press);transition:transform .1s;margin-top:16px}
.btn:active{transform:translateY(3px);box-shadow:none}
.btn:disabled{background:var(--muted);color:var(--text-2);box-shadow:none;transform:none}
.btn.ghost{background:transparent;color:var(--text-2);box-shadow:none;border:1.5px solid var(--border);margin-top:9px}
.btn.ghost:active{transform:none;background:var(--surface)}
.errbox{background:rgba(196,69,60,.13);border:1px solid rgba(196,69,60,.4);color:#f0a49e;border-radius:10px;padding:11px 13px;font-size:13px;margin-bottom:13px}
.swap{text-align:center;margin-top:18px;font-size:13px;color:var(--text-2)}
.swap b{color:var(--amber);cursor:pointer;font-weight:600}

/* espera */
.wait{text-align:center;max-width:360px}
.wait .ic{width:76px;height:76px;margin:0 auto 22px;border-radius:50%;border:2px dashed rgba(217,164,65,.5);display:grid;place-items:center;color:var(--warn);animation:spin 14s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wait h2{font-family:var(--ff-d);font-weight:700;font-size:24px;letter-spacing:-.025em}
.wait p{color:var(--text-2);font-size:14px;margin:10px 0 4px}
.wait .who{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;margin:22px 0;text-align:left}
.wait .who div{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
.wait .who span{color:var(--text-2)}
.wait .who b{font-weight:600}
.pillw{display:inline-flex;align-items:center;gap:6px;font-family:var(--ff-m);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--warn);border:1px solid rgba(217,164,65,.4);border-radius:99px;padding:4px 10px}
.pillw i{width:6px;height:6px;border-radius:50%;background:var(--warn);animation:bl 1.4s infinite}
@keyframes bl{50%{opacity:.25}}

/* ============ SHELL ============ */
#app{min-height:100%;display:none;flex-direction:column}
#app.on{display:flex}
.top{position:sticky;top:0;z-index:20;background:rgba(15,13,12,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding-top:var(--safe-t)}
.top-in{max-width:1180px;margin:0 auto;padding:11px 15px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:9px}
.brand .mark{width:18px;height:23px}
.hud{margin-left:auto;display:flex;align-items:center;gap:6px}
.chip{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-family:var(--ff-m);font-size:13px}
.chip svg{width:14px;height:14px;flex:none}
.chip.st svg{color:var(--muted)}
.chip.st.on{border-color:rgba(224,122,53,.4)}.chip.st.on svg{color:var(--amber)}
.chip.xp{color:var(--text-2)}.chip.xp b{color:var(--text);font-weight:500}
.chip.hp{gap:3px;padding:6px 9px}
.hrt{width:13px;height:13px;color:var(--err);transition:.25s}.hrt.off{color:var(--muted);transform:scale(.8)}

.body{flex:1;width:100%;max-width:1180px;margin:0 auto;padding:16px 15px calc(90px + var(--safe-b))}
@media(min-width:900px){
  .body{display:grid;grid-template-columns:212px 1fr 296px;gap:26px;align-items:start;padding-bottom:40px}
  .side{position:sticky;top:74px;display:block!important}
  .rail{position:sticky;top:74px;display:block!important}
  .navbar{display:none!important}
}
.side,.rail{display:none}

/* nav */
.navbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(15,13,12,.94);backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:8px 0 calc(8px + var(--safe-b));display:flex}
.nv{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;color:var(--muted);transition:.15s}
.nv svg{width:23px;height:23px}
.nv span{font-family:var(--ff-m);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase}
.nv.on{color:var(--amber)}
.side .nv{flex-direction:row;justify-content:flex-start;gap:11px;padding:11px 13px;border-radius:11px;border:1.5px solid transparent}
.side .nv span{font-family:var(--ff-d);font-size:13px;letter-spacing:0;text-transform:none;font-weight:600}
.side .nv.on{background:var(--surface);border-color:rgba(224,122,53,.35)}
@media(hover:hover){.side .nv:hover:not(.on){background:var(--surface)}}
.side-brand{display:flex;align-items:center;gap:9px;padding:0 13px 18px}
.side-brand .mark{width:20px;height:26px}

/* seletor de materia */
.matbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:11px;margin-bottom:5px;scrollbar-width:none}
.matbar::-webkit-scrollbar{display:none}
.mb{flex:none;padding:8px 14px;border-radius:99px;background:var(--surface);border:1.5px solid var(--border);font-size:13px;font-weight:600;white-space:nowrap;color:var(--text-2)}
.mb.on{border-color:var(--amber);color:var(--text);background:var(--raised)}
.mb.lock{opacity:.5}

/* ============ TRILHA SERPENTEADA ============ */
.unit-band{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin:16px 0 8px;position:relative;overflow:hidden}
.unit-band::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(224,122,53,.1),transparent 70%)}
.unit-band .t{flex:1;min-width:0}
.unit-band small{font-family:var(--ff-m);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-2)}
.unit-band b{display:block;font-family:var(--ff-d);font-weight:700;font-size:16px;letter-spacing:-.02em;margin-top:2px}
.unit-band .pc{font-family:var(--ff-m);font-size:12px;color:var(--amber);flex:none}

.path{position:relative;padding:16px 0 22px;display:flex;flex-direction:column;align-items:center;gap:9px}
.node-wrap{position:relative;display:flex;flex-direction:column;align-items:center;transition:transform .3s}
.node{
  width:66px;height:66px;border-radius:50%;position:relative;
  background:var(--raised);border:2px solid var(--border);
  display:grid;place-items:center;color:var(--muted);
  box-shadow:0 5px 0 #100E0D;transition:transform .12s,background .2s;
}
.node:active{transform:translateY(5px);box-shadow:none}
.node svg{width:26px;height:26px}
.node .num{font-family:var(--ff-m);font-size:17px}
.node.done{background:var(--amber);border-color:var(--amber-hover);color:#170F08;box-shadow:0 5px 0 var(--amber-press)}
.node.done .mark{width:22px;height:28px}
.node.cur{background:var(--raised);border-color:var(--amber);color:var(--amber);box-shadow:0 5px 0 var(--amber-press)}
.node.cur::before{content:"";position:absolute;inset:-9px;border-radius:50%;border:2px solid rgba(224,122,53,.28);animation:pl 2s ease-out infinite}
@keyframes pl{0%{transform:scale(.9);opacity:.9}100%{transform:scale(1.18);opacity:0}}
.node.pro{border-color:rgba(217,164,65,.45);color:var(--warn);border-style:dashed;box-shadow:0 5px 0 #100E0D}
.node.lock{cursor:default}
.node.lock:active{transform:none;box-shadow:0 5px 0 #100E0D}
.node-lab{font-size:11.5px;color:var(--text-2);margin-top:6px;text-align:center;max-width:130px;line-height:1.3}
.node-wrap.done .node-lab,.node-wrap.cur .node-lab{color:var(--text)}
.start-bub{
  position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  background:var(--amber);color:#170F08;font-family:var(--ff-d);font-weight:700;font-size:11px;
  letter-spacing:.1em;padding:6px 12px;border-radius:8px;white-space:nowrap;
  box-shadow:0 3px 0 var(--amber-press);animation:bob 1.6s ease-in-out infinite;
}
.start-bub::after{content:"";position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--amber);border-bottom:0}
@keyframes bob{50%{transform:translateX(-50%) translateY(-5px)}}
.pro-tag{position:absolute;top:-8px;right:-8px;background:var(--warn);color:#1a1204;font-family:var(--ff-m);font-size:8.5px;letter-spacing:.08em;padding:2px 5px;border-radius:5px;font-weight:700}

/* rail direito */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card h3{font-family:var(--ff-d);font-weight:600;font-size:13px;letter-spacing:.03em;text-transform:uppercase;color:var(--text-2);margin-bottom:12px}
.kv{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13.5px}
.kv+.kv{border-top:1px solid var(--border)}
.kv span{color:var(--text-2)}
.kv b{font-family:var(--ff-m);font-weight:500}
.kv b.a{color:var(--amber)}

/* ============ RANKING ============ */
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tb{flex:1;padding:10px;border-radius:10px;background:var(--surface);border:1.5px solid var(--border);font-size:13px;font-weight:600;color:var(--text-2)}
.tb.on{border-color:var(--amber);color:var(--text);background:var(--raised)}
.rk{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px}
.rk.me{border-color:var(--amber);background:var(--raised)}
.rk .pos{width:28px;flex:none;text-align:center;font-family:var(--ff-m);font-size:14px;color:var(--text-2)}
.rk.p1 .pos,.rk.p2 .pos,.rk.p3 .pos{color:var(--amber);font-weight:700}
.rk .av{width:36px;height:36px;flex:none;border-radius:50%;background:var(--raised);border:1px solid var(--border);display:grid;place-items:center;font-family:var(--ff-d);font-weight:700;font-size:14px;color:var(--text-2)}
.rk.me .av{background:var(--amber);color:#170F08;border-color:var(--amber)}
.rk .info{flex:1;min-width:0}
.rk .info b{display:block;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rk .info small{color:var(--text-2);font-size:11.5px}
.rk .xp{font-family:var(--ff-m);font-size:14px;color:var(--amber);flex:none}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:36px 20px;border:1px dashed var(--border);border-radius:12px}

/* ============ PERFIL ============ */
.prof-head{display:flex;align-items:center;gap:15px;margin-bottom:18px}
.prof-av{width:62px;height:62px;border-radius:50%;background:var(--amber);color:#170F08;display:grid;place-items:center;font-family:var(--ff-d);font-weight:700;font-size:24px;flex:none}
.prof-head b{display:block;font-family:var(--ff-d);font-weight:700;font-size:20px;letter-spacing:-.02em}
.prof-head small{color:var(--text-2);font-size:13px}
.gr{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:14px}
.st{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px}
.st b{display:block;font-family:var(--ff-m);font-size:21px}
.st b.a{color:var(--amber)}
.st small{color:var(--text-2);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}
.acc{display:flex;align-items:center;gap:10px;padding:11px 0;font-size:13.5px}
.acc+.acc{border-top:1px solid var(--border)}
.acc .d{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none}
.acc .d.p{background:var(--warn)}
.acc b{flex:1;font-weight:600}
.acc span{font-family:var(--ff-m);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2)}
.pro-banner{background:linear-gradient(135deg,rgba(217,164,65,.16),rgba(224,122,53,.08));border:1px solid rgba(217,164,65,.35);border-radius:14px;padding:16px;margin-bottom:12px}
.pro-banner b{font-family:var(--ff-d);font-weight:700;font-size:15px;color:var(--warn)}
.pro-banner p{color:var(--text-2);font-size:12.5px;margin-top:4px}

/* ============ PALCO ============ */
#stage{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column}
#stage.on{display:flex}
.stop{flex:none;padding:calc(11px + var(--safe-t)) 14px 11px;display:flex;align-items:center;gap:12px;max-width:820px;width:100%;margin:0 auto}
.x{width:32px;height:32px;flex:none;display:grid;place-items:center;border-radius:9px;color:var(--text-2)}
.pbar{flex:1;height:9px;background:var(--raised);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.pbar i{display:block;height:100%;width:0;background:var(--amber);border-radius:99px;transition:width .45s cubic-bezier(.2,.8,.2,1)}
.pw{flex:1;min-height:0;display:flex;justify-content:center}
@media(min-width:820px){.pw{padding:0 16px 18px}}
.paper{flex:1;max-width:820px;width:100%;background:var(--paper);color:var(--ink);border-radius:18px 18px 0 0;display:flex;flex-direction:column;min-height:0;box-shadow:0 24px 70px rgba(0,0,0,.5)}
@media(min-width:820px){.paper{border-radius:18px}}
.pscroll{flex:1;overflow-y:auto;padding:26px 20px 18px;-webkit-overflow-scrolling:touch}
@media(min-width:640px){.pscroll{padding:34px 38px 22px}}
.q-k{font-family:var(--ff-m);font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-2);margin-bottom:9px}
.q-t{font-family:var(--ff-d);font-weight:600;font-size:21px;line-height:1.32;letter-spacing:-.02em;margin-bottom:20px}
@media(min-width:640px){.q-t{font-size:24px}}
.opts{display:grid;gap:9px}
.opt{display:flex;align-items:center;gap:12px;text-align:left;width:100%;background:#fff;border:1.5px solid var(--ink-line);border-radius:12px;padding:14px 15px;font-size:15px;line-height:1.35;transition:transform .12s,border-color .15s;box-shadow:0 2px 0 var(--ink-line)}
.opt:active{transform:translateY(2px);box-shadow:none}
.opt .k{width:24px;height:24px;flex:none;border-radius:6px;border:1.5px solid var(--ink-line);display:grid;place-items:center;font-family:var(--ff-m);font-size:11px;color:var(--ink-2)}
.opt.sel{border-color:var(--ink)}.opt.sel .k{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.opt.right{border-color:var(--ok);background:rgba(110,130,87,.1)}.opt.right .k{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong{border-color:var(--err);background:rgba(196,69,60,.09)}.opt.wrong .k{background:var(--err);border-color:var(--err);color:#fff}
.opt.dead{opacity:.45}
.vf{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.vf .opt{justify-content:center;flex-direction:column;gap:7px;padding:22px 12px;font-family:var(--ff-d);font-weight:600;font-size:16px}
.vf .opt svg{width:26px;height:26px;color:var(--ink-2)}
.vf .opt.right svg{color:var(--ok)}.vf .opt.wrong svg{color:var(--err)}
.claim{background:#fff;border:1.5px solid var(--ink-line);border-left:4px solid var(--ink);border-radius:10px;padding:15px;font-size:16px;line-height:1.45;margin-bottom:18px}
.buckets{display:grid;gap:11px;margin-bottom:16px}
@media(min-width:560px){.buckets{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}}
.bucket{background:rgba(0,0,0,.03);border:1.5px dashed var(--ink-line);border-radius:12px;padding:11px;min-height:96px;transition:.15s}
.bucket.armed{border-color:var(--ink);background:rgba(0,0,0,.06)}
.bucket.right{border-color:var(--ok);border-style:solid;background:rgba(110,130,87,.08)}
.bucket.wrong{border-color:var(--err);border-style:solid;background:rgba(196,69,60,.07)}
.bucket h4{font-family:var(--ff-d);font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);margin-bottom:9px}
.bucket .drop{display:flex;flex-wrap:wrap;gap:6px}
.pool{display:flex;flex-wrap:wrap;gap:7px;min-height:44px;padding-top:4px;border-top:1px solid var(--ink-line)}
.tk{background:#fff;border:1.5px solid var(--ink-line);border-radius:9px;padding:9px 12px;font-size:14px;font-weight:500;line-height:1.2;box-shadow:0 2px 0 var(--ink-line);transition:transform .12s}
.tk:active{transform:translateY(2px);box-shadow:none}
.tk.sel{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.tk.mini{padding:6px 9px;font-size:13px;box-shadow:none}
.tk.bad{border-color:var(--err);color:var(--err)}
.tk.gone{opacity:0;pointer-events:none;position:absolute}
.pairs{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pcol{display:grid;gap:9px;align-content:start}
.pit{background:#fff;border:1.5px solid var(--ink-line);border-radius:11px;padding:13px 12px;font-size:13.5px;line-height:1.3;text-align:left;box-shadow:0 2px 0 var(--ink-line);transition:transform .12s,.15s}
.pit:active{transform:translateY(2px);box-shadow:none}
.pit.sel{border-color:var(--ink);background:var(--ink);color:var(--paper)}
.pit.linked{border-color:var(--ok);background:rgba(110,130,87,.12);box-shadow:none;opacity:.72}
.pit.linked::after{content:attr(data-n);font-family:var(--ff-m);font-size:10px;color:var(--ok);float:right;margin-left:6px}
.pit.shake{animation:shk .3s}
@keyframes shk{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.frase{background:#fff;border:1.5px solid var(--ink-line);border-radius:12px;padding:17px;font-size:16.5px;line-height:2.15;margin-bottom:16px}
.gap{display:inline-block;min-width:96px;padding:2px 8px;margin:0 2px;border-bottom:2.5px solid var(--ink-2);text-align:center;font-weight:600;color:var(--ink-2)}
.gap.full{border-bottom-color:var(--ink);color:var(--ink);background:rgba(0,0,0,.04);border-radius:5px 5px 0 0}
.gap.right{border-bottom-color:var(--ok);color:var(--ok)}
.gap.wrong{border-bottom-color:var(--err);color:var(--err)}
.seq{display:grid;gap:8px;margin-bottom:14px;min-height:52px}
.sq{display:flex;align-items:center;gap:11px;background:#fff;border:1.5px solid var(--ink-line);border-radius:11px;padding:12px 13px;font-size:14.5px;text-align:left;box-shadow:0 2px 0 var(--ink-line)}
.sq .i{width:22px;height:22px;flex:none;border-radius:6px;background:var(--ink);color:var(--paper);display:grid;place-items:center;font-family:var(--ff-m);font-size:11px}
.sq.right{border-color:var(--ok);background:rgba(110,130,87,.1)}.sq.right .i{background:var(--ok)}
.sq.wrong{border-color:var(--err);background:rgba(196,69,60,.08)}.sq.wrong .i{background:var(--err)}
.calc-out{background:#fff;border:1.5px solid var(--ink-line);border-radius:12px;padding:20px;text-align:center;margin-bottom:14px}
.calc-out .v{font-family:var(--ff-m);font-size:36px;min-height:44px;line-height:1.2}
.calc-out .v.ph{color:var(--ink-line)}
.calc-out .u{font-family:var(--ff-m);font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-2);margin-top:4px}
.calc-out.right{border-color:var(--ok)}.calc-out.right .v{color:var(--ok)}
.calc-out.wrong{border-color:var(--err)}.calc-out.wrong .v{color:var(--err)}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pad button{background:#fff;border:1.5px solid var(--ink-line);border-radius:11px;padding:15px 0;font-family:var(--ff-m);font-size:19px;box-shadow:0 2px 0 var(--ink-line);transition:transform .1s}
.pad button:active{transform:translateY(2px);box-shadow:none;background:var(--paper-2)}
.dica{background:rgba(217,164,65,.12);border:1px solid rgba(217,164,65,.4);border-radius:9px;padding:10px 12px;font-size:13px;color:#8a6410;margin-bottom:13px}
.dica b{font-family:var(--ff-m);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:3px}
.pfoot{flex:none;padding:13px 20px calc(15px + var(--safe-b));border-top:1px solid var(--ink-line);background:var(--paper);border-radius:0 0 18px 18px}
@media(min-width:640px){.pfoot{padding-left:38px;padding-right:38px}}
.cta{width:100%;padding:15px;border-radius:12px;font-family:var(--ff-d);font-weight:700;font-size:15px;letter-spacing:.03em;text-transform:uppercase;background:var(--ink);color:var(--paper);box-shadow:0 3px 0 #000;transition:transform .1s}
.cta:active{transform:translateY(3px);box-shadow:none}
.cta:disabled{background:var(--ink-line);color:#fff;box-shadow:none;transform:none}
.cta.ok{background:var(--ok);box-shadow:0 3px 0 #4d5c3c}
.cta.no{background:var(--err);box-shadow:0 3px 0 #8c2f28}
.fb{display:none;align-items:flex-start;gap:11px;margin-bottom:12px}
.fb.on{display:flex;animation:up .28s cubic-bezier(.2,.9,.3,1.2)}
@keyframes up{from{opacity:0;transform:translateY(14px)}}
.fb .ic{width:26px;height:26px;flex:none;border-radius:50%;display:grid;place-items:center;color:#fff}
.fb.good .ic{background:var(--ok)}.fb.bad .ic{background:var(--err)}
.fb .tx{font-size:13.5px;line-height:1.45}
.fb .tx b{display:block;font-family:var(--ff-d);font-size:14.5px;margin-bottom:2px}
.fb.good .tx b{color:#43542f}.fb.bad .tx b{color:var(--err)}
.fb .tx span{color:var(--ink-2)}
.xpf{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);font-family:var(--ff-d);font-weight:700;font-size:34px;color:var(--amber);pointer-events:none;z-index:90;opacity:0}
.xpf.go{animation:xpg 1s ease-out forwards}
@keyframes xpg{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}22%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}100%{opacity:0;transform:translate(-50%,-210%) scale(.95)}}
#done{position:fixed;inset:0;z-index:70;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center}
#done.on{display:flex;animation:fin .4s}
@keyframes fin{from{opacity:0}}
.dm{color:var(--amber);width:74px;height:94px;margin-bottom:22px;animation:pop .6s cubic-bezier(.2,.9,.3,1.4)}
@keyframes pop{0%{transform:scale(0) rotate(-14deg);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1)}}
#done h2{font-family:var(--ff-d);font-weight:700;font-size:29px;letter-spacing:-.03em}
#done .sub{color:var(--text-2);font-size:14px;margin-top:6px;max-width:330px}
.dst{display:flex;gap:9px;margin:26px 0 28px;flex-wrap:wrap;justify-content:center}
.ds{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 20px;min-width:96px}
.ds b{display:block;font-family:var(--ff-m);font-size:22px}
.ds small{color:var(--text-2);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.ds.a b{color:var(--amber)}
#modal{position:fixed;inset:0;z-index:80;background:rgba(10,8,7,.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px}
#modal.on{display:flex;animation:fin .2s}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center}
.mbox h3{font-family:var(--ff-d);font-weight:600;font-size:19px;letter-spacing:-.02em}
.mbox p{color:var(--text-2);font-size:13.5px;margin:9px 0 20px}

/* check-in diário: rende uma vez por dia */
function checkin(db,u,now){
  const t=dstr(new Date(now||Date.now()));
  if(u.lastCheckin===t) return null;
  u.lastCheckin=t; u.brasas=(u.brasas||0)+CHECKIN_BRASAS;
  save(db); return CHECKIN_BRASAS;
}

/* vidas: virou o dia enche tudo; abaixo do máximo, +1 a cada 3 horas.
   Sem timer: tudo é calculado na hora a partir de heartsAt. */
function regenVidas(u,now){
  now=now||Date.now();
  const hoje=dstr(new Date(now));
  if(u.vidaDia!==hoje){ u.vidaDia=hoje; u.hearts=MAX_VIDAS; u.heartsAt=null; return; }
  if(u.hearts>=MAX_VIDAS){ u.heartsAt=null; return; }
  if(u.heartsAt==null){ u.heartsAt=now; return; }
  const n=Math.floor((now-u.heartsAt)/REGEN_MS);
  if(n>0){
    u.hearts=Math.min(MAX_VIDAS,u.hearts+n);
    u.heartsAt = u.hearts>=MAX_VIDAS ? null : u.heartsAt+n*REGEN_MS;
  }
}
function perderVida(u,now){
  now=now||Date.now();
  if(u.hearts<=0) return 0;
  if(u.heartsAt==null) u.heartsAt=now;
  u.hearts--; return u.hearts;
}
function proximaVidaEm(u,now){
  now=now||Date.now();
  if(u.hearts>=MAX_VIDAS||u.heartsAt==null) return null;
  return Math.max(0,(u.heartsAt+REGEN_MS)-now);
}

/* compras com moeda */
function comprarItem(db,u,itemId){
  const it=(db.loja||[]).find(i=>i.id===itemId);
  if(!it) return {ok:false,err:"Esse item não existe."};
  if((u.inv||[]).includes(itemId)) return {ok:false,err:"Você já tem esse item."};
  if(it.moeda==="merito") return {ok:false,err:"Essa insígnia não se compra."+(it.dica?" "+it.dica+".":"")};
  if(it.ate && Date.now()>new Date(it.ate+"T23:59:59").getTime())
    return {ok:false,err:"Esse item saiu de circulação."};
  const m=it.moeda;
  if((u[m]||0)<it.preco) return {ok:false,err:m==="ambar"?"Âmbar insuficiente.":"Brasas insuficientes."};
  u[m]-=it.preco; u.inv.push(itemId);
  save(db); return {ok:true,item:it};
}
function equipar(db,u,itemId){
  const it=(db.loja||[]).find(i=>i.id===itemId);
  if(!it||!(u.inv||[]).includes(itemId)) return false;
  u.equip[it.tipo] = (u.equip[it.tipo]===itemId) ? null : itemId;
  save(db); return true;
}

/* pedidos de Âmbar via Pix (a confirmação é humana, no painel) */
function pedirAmbar(db,u,pacoteId,txid){
  if((db.pedidos||[]).some(p=>p.uid===u.id&&p.status==="pendente"))
    return {ok:false,err:"Você já tem um pedido aguardando confirmação."};
  const pc=PACOTES.find(p=>p.id===pacoteId);
  if(!pc) return {ok:false,err:"Pacote inválido."};
  const pd={ id:uid("px"), uid:u.id, pacoteId:pc.id, ambar:pc.ambar, valor:pc.preco,
             txid:String(txid||"").slice(0,25), status:"pendente", criadoEm:Date.now() };
  db.pedidos.push(pd); save(db); return {ok:true,pedido:pd};
}
function confirmarPedido(db,pid){
  const pd=(db.pedidos||[]).find(x=>x.id===pid);
  if(!pd||pd.status!=="pendente") return false;
  const u=db.users[pd.uid]; if(!u) return false;
  pd.status="confirmado"; pd.resolvidoEm=Date.now();
  u.ambar=(u.ambar||0)+pd.ambar;
  save(db); return true;
}
function recusarPedido(db,pid){
  const pd=(db.pedidos||[]).find(x=>x.id===pid);
  if(!pd||pd.status!=="pendente") return false;
  pd.status="recusado"; pd.resolvidoEm=Date.now();
  save(db); return true;
}
function creditarAmbar(db,uid_,qtd){
  const u=db.users[uid_]; qtd=Math.floor(Number(qtd));
  if(!u||!(qtd>0)) return false;
  u.ambar=(u.ambar||0)+qtd; save(db); return true;
}

/* Pix copia e cola (BR Code / EMV). Estático com valor: o aluno paga o
   pacote exato e o txid liga o extrato ao pedido no painel. */
function crc16(str){
  let c=0xFFFF;
  for(let i=0;i<str.length;i++){
    c^=str.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) c=(c&0x8000)?(((c<<1)^0x1021)&0xFFFF):((c<<1)&0xFFFF);
  }
  return c.toString(16).toUpperCase().padStart(4,"0");
}
function pixPayload(cfg,valor,txid){
  const norm=(x,max)=>String(x||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Za-z0-9 ]/g,"").toUpperCase().trim().slice(0,max).trim();
  const f=(id,v)=>id+String(v.length).padStart(2,"0")+v;
  const chave=String(cfg.pixChave||"").trim();
  if(!chave) return null;
  const tx=String(txid||"").replace(/[^A-Za-z0-9]/g,"").slice(0,25)||"***";
  let s=f("00","01")
       +f("26",f("00","br.gov.bcb.pix")+f("01",chave))
       +f("52","0000")+f("53","986")
       +f("54",Number(valor).toFixed(2))
       +f("58","BR")
       +f("59",norm(cfg.pixNome,25)||"MODUS EDU")
       +f("60",norm(cfg.pixCidade,15)||"RIO DE JANEIRO")
       +f("62",f("05",tx))
       +"6304";
  return s+crc16(s);
}

/* insígnias de mérito: o que dinheiro nenhum compra */
function checarMeritos(db,u){
  const ganha=[];
  const tem=id=>(u.inv||[]).includes(id);
  const da=id=>{ const it=(db.loja||[]).find(i=>i.id===id); if(it){ u.inv.push(id); ganha.push(it); } };
  if(!tem("me_semana")&&(u.streak||0)>=7) da("me_semana");
  if(!tem("me_cem")&&(u.resp||0)>=100) da("me_cem");
  if(!tem("me_fase")){
    const fechou=materiasDe(db,u).some(m=>m.unidades.some(un=>{
      const ls=un.licoes.filter(l=>l.ex&&l.ex.length);
      return ls.length>0&&ls.every(l=>u.done&&u.done[l.id]);
    }));
    if(fechou) da("me_fase");
  }
  if(ganha.length) save(db);
  return ganha;
}

/* migração: bancos v2 existentes ganham a loja sem perder nada */
function migrate3(d){
  if(!(d.v>=3)) d.v=3;
  if(!d.loja) d.loja=LOJA();
  if(!d.pedidos) d.pedidos=[];
  if(!d.config) d.config={pixChave:"",pixNome:"Modus Edu",pixCidade:"Rio de Janeiro"};
  Object.values(d.users).forEach(u=>{
    if(u.role!=="aluno") return;
    if(u.brasas==null) u.brasas=0;
    if(u.ambar==null) u.ambar=0;
    if(!u.inv) u.inv=[];
    if(!u.equip) u.equip={moldura:null,flair:null,titulo:null};
    if(u.lastCheckin===undefined) u.lastCheckin=null;
    if(u.vidaDia===undefined) u.vidaDia=null;
    if(u.heartsAt===undefined) u.heartsAt=null;
  });
  const br=Object.values(d.users).find(u=>u.email==="bruno@demo.com");
  if(br&&!d.pedidos.length)
    d.pedidos.push({ id:"px_demo1", uid:br.id, pacoteId:"p120", ambar:120, valor:19.90,
      txid:"PXDEMO1", status:"pendente", criadoEm:Date.now()-36e5 });
}

/* v4: catálogo de insígnias no lugar dos emojis. Quem tinha item
   aposentado recebe o valor de volta na moeda original. Preço editado
   pelo gestor sobrevive quando o item continua em linha. */
const REEMBOLSO_V4={ fl_livro:["brasas",60], fl_cafe:["brasas",60], fl_alvo:["brasas",80],
  fl_raio:["brasas",80], fl_cerebro:["brasas",100], fl_foguete:["brasas",100],
  fl_diamante:["ambar",60], fl_coroa:["ambar",80], fl_aguia:["ambar",120] };
function migrate4(d){
  if(d.v>=4) return;
  d.v=4;
  const velho=d.loja||[];
  d.loja=LOJA();
  d.loja.forEach(n=>{ const o=velho.find(x=>x.id===n.id);
    if(o&&o.preco>0&&n.moeda!=="merito") n.preco=o.preco; });
  const ids=new Set(d.loja.map(i=>i.id));
  Object.values(d.users).forEach(u=>{
    if(u.role!=="aluno") return;
    if(!u.equip) u.equip={};
    ["moldura","flair","titulo","nome","aura"].forEach(k=>{ if(u.equip[k]===undefined) u.equip[k]=null; });
    (u.inv||[]).filter(id=>!ids.has(id)).forEach(id=>{
      const r=REEMBOLSO_V4[id]; if(r) u[r[0]]=(u[r[0]]||0)+r[1];
    });
    u.inv=(u.inv||[]).filter(id=>ids.has(id));
    Object.keys(u.equip).forEach(k=>{ if(u.equip[k]&&!ids.has(u.equip[k])) u.equip[k]=null; });
  });
  const la=Object.values(d.users).find(u=>u.email==="larissa@demo.com");
  if(la&&!la.inv.length){ la.brasas=la.brasas||240; la.ambar=la.ambar||30;
    la.inv=["mo_brasa","in_brasav","nm_ambar"];
    la.equip.moldura="mo_brasa"; la.equip.flair="in_brasav"; la.equip.nome="nm_ambar"; }
  const br=Object.values(d.users).find(u=>u.email==="bruno@demo.com");
  if(br&&!br.inv.length){ br.brasas=br.brasas||180; br.inv=["in_livro"]; br.equip.flair="in_livro"; }
}

/* ---------- persistência (o único ponto a trocar por Firebase) ---------- */
function load(){
  let d=null;
  try{ d=JSON.parse(localStorage.getItem(K_DB)||"null"); }catch(e){}
  if(!d||(d.v!==2&&d.v!==3&&d.v!==4)){ d=DEFAULT_DB(); }
  migrate3(d); migrate4(d); localStorage.setItem(K_DB,JSON.stringify(d));
  return d;
}
function save(d){ localStorage.setItem(K_DB,JSON.stringify(d)); }
function wipe(){ localStorage.removeItem(K_DB); localStorage.removeItem(K_SESS); }

/* ---------- sessão ---------- */
const getSession=()=>localStorage.getItem(K_SESS);
const setSession=id=>localStorage.setItem(K_SESS,id);
const clearSession=()=>localStorage.removeItem(K_SESS);

/* ---------- consultas ---------- */
const byEmail=(db,e)=>Object.values(db.users).find(u=>u.email.toLowerCase()===String(e).toLowerCase());
const alunos=db=>Object.values(db.users).filter(u=>u.role==="aluno");

function novoAluno(db,{nome,email,senha,cursoId}){
  const c=db.cursos[cursoId];
  const u={ id:uid("a"), role:"aluno", nome, email, senha, cursoId,
    status:"pendente",
    /* o curso é só o pacote inicial: ele semeia o acesso no cadastro.
       Depois disso quem manda é este array, não o curso. */
    acesso: c ? c.materias.slice() : [],
    foto:null,
    brasas:0, ambar:0, inv:[], equip:{moldura:null,flair:null,titulo:null,nome:null,aura:null},
    lastCheckin:null, vidaDia:null, heartsAt:null,
    pro:false, xp:0, streak:0, lastDay:null, hearts:5, done:{},
    resp:0, certo:0, melhor:0, criadoEm:Date.now() };
  db.users[u.id]=u; return u;
}

/* matérias que o aluno realmente enxerga */
function materiasDe(db,u){
  return (u.acesso||[]).map(id=>db.materias[id]).filter(Boolean);
}

function ranking(db,cursoId){
  return alunos(db)
    .filter(u=>u.status==="aprovado" && (!cursoId||u.cursoId===cursoId) && u.xp>0)
    .sort((a,b)=>b.xp-a.xp || a.nome.localeCompare(b.nome));
}

/* ---------- streak ---------- */
const dstr=d=>d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
function tickStreak(u){
  const t=dstr(new Date());
  if(u.lastDay===t) return;
  const y=dstr(new Date(Date.now()-864e5));
  u.streak = (u.lastDay===y) ? (u.streak||0)+1 : 1;
  u.lastDay=t;
}

/* ---------- conteúdo ---------- */
const licoesDe=m=>m.unidades.flatMap(u=>u.licoes);
const contaEx=m=>licoesDe(m).reduce((s,l)=>s+(l.ex?l.ex.length:0),0);

/* aplica o pacote de um curso aos alunos já cadastrados (adiciona, nunca remove) */
function aplicarPacote(db,cursoId){
  const c=db.cursos[cursoId]; if(!c) return 0;
  let n=0;
  alunos(db).filter(u=>u.cursoId===cursoId).forEach(u=>{
    let mudou=false;
    c.materias.forEach(m=>{ if(!u.acesso.includes(m)){ u.acesso.push(m); mudou=true; } });
    if(mudou) n++;
  });
  return n;
}

return { load,save,wipe,getSession,setSession,clearSession,byEmail,alunos,novoAluno,
         materiasDe,ranking,tickStreak,licoesDe,contaEx,aplicarPacote,uid,DEFAULT_DB,
         hojeStr,checkin,regenVidas,perderVida,proximaVidaEm,
         comprarItem,equipar,pedirAmbar,confirmarPedido,recusarPedido,creditarAmbar,
         pixPayload,PACOTES,MAX_VIDAS,INSIG,checarMeritos };
})();

    const st={nome,email,cursoId:cid};

    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) return telaCadastro("E-mail inválido.",st);
    if(senha.length<4) return telaCadastro("A senha precisa de pelo menos 4 caracteres.",st);
    if(!cid) return telaCadastro("Escolha sua área de interesse.",st);
    if(CORE.byEmail(db,email)) return telaCadastro("Já existe uma conta com esse e-mail.",st);
    const u=CORE.novoAluno(db,{nome,email,senha,cursoId:cid});
    CORE.save(db); CORE.setSession(u.id); entrar(u.id);
  };
}

function vTrilha(){
  const v=$("#view"); v.innerHTML="";
  const hr=new Date().getHours();
  const sau=hr>=5&&hr<12?"Bom dia":hr<18?"Boa tarde":"Boa noite";
  const hello=el("div","hello",sau+", "+esc(me.nome.trim().split(/\s+/)[0]));

  const bar=el("div","matbar");
  mats.forEach(m=>{ const b=el("button","mb"+(m.id===matAtual?" on":""),esc(m.nome));
    b.onclick=()=>{matAtual=m.id;vTrilha();}; bar.appendChild(b); });
  v.appendChild(bar);

    const path=el("div","path");
    u.licoes.forEach(l=>{
      const done=!!me.done[l.id];
      const vazia=!l.ex||!l.ex.length;
      const isPro = l.plano==="pro" && !me.pro;
      const bloq = vazia || isPro || (!done && !liberado);
      const cur = !done && !bloq && liberado;
      if(!done && !bloq) liberado=false;

      const w=el("div","node-wrap"+(done?" done":"")+(cur?" cur":""));
      w.style.transform="translateX("+OFF[gi%OFF.length]+"px)"; gi++;
      if(cur) w.appendChild(el("div","start-bub","COMEÇAR"));
      const n=el("button","node"+(done?" done":cur?" cur":isPro?" pro":"")+(bloq?" lock":""));
      n.innerHTML = done ? '<svg class="mark"><use href="#m"/></svg>'
        : isPro ? ICO_LOCK : bloq ? ICO_LOCK : (vazia? ICO_LOCK : ICO_STAR);
      if(l.plano==="pro") n.appendChild(el("div","pro-tag","PRO"));
      if(isPro) n.onclick=()=>modal("Conteúdo Pro","“"+l.titulo+"” faz parte do plano Pro. Aqui entraria a proposta de assinatura.",
        [{t:"Quero assinar",c:"amber",f:()=>{closeModal();modal("Em breve","O checkout ainda não existe. Peça a liberação ao gestor.",[{t:"Ok",f:closeModal}]);}},{t:"Agora não",c:"ghost",f:closeModal}]);
      else if(vazia) n.onclick=()=>modal("Em breve","Esta lição ainda não tem exercícios publicados.",[{t:"Ok",f:closeModal}]);
      else if(!bloq) n.onclick=()=>abrir(l);
      w.appendChild(n);
      w.appendChild(el("div","node-lab",esc(l.titulo)));
      path.appendChild(w);
    });
    v.appendChild(path);
  });
  rail();
}

  return `<span class="flair ${cor}${it.fx?" fx-"+it.fx:""}${extra?" "+extra:""}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${CORE.INSIG[it.ic]}</svg></span>`;
}
const moldEq=eq=>{const it=lojaItem(eq&&eq.moldura);return it?" "+it.css:"";};
const flairEq=eq=>insigSVG(lojaItem(eq&&eq.flair));

const nomeEq=eq=>{const it=lojaItem(eq&&eq.nome);return it?" "+it.css:"";};
const auraEq=eq=>{const it=lojaItem(eq&&eq.aura);return it?" "+it.css:"";};
const mold=u=>moldEq(u&&u.equip);

function msgVida(){
  const ms=CORE.proximaVidaEm(me);

                 : mer?`<span class="seal m">MÉRITO</span>`
                 : prem?`<span class="seal">ÂMBAR</span>`:"";
      let prev;
      if(tipo==="moldura")    prev=`<div class="pav${" "+it.css}">${esc((pn[0]||"M")).toUpperCase()}</div>`;
      else if(tipo==="flair") prev=`<div class="pem2">${insigSVG(it,"big")}</div>`;
      else if(tipo==="nome")  prev=`<div class="pnm nm ${it.css}">${esc(pn)}</div>`;
      else if(tipo==="aura")  prev=`<div class="pau ${it.css}"></div>`;

      b.innerHTML=`${selo}${prev}<b>${esc(it.nome)}</b><span class="pr${prem?" a":""}${mer?" m":""}">${preco}</span>`;
      b.onclick=()=>{ if(tem){ CORE.equipar(db,me,it.id); vLoja(); } else abrirProv(it); };
      grid.appendChild(b);
    });
    bloco.appendChild(grid); v.appendChild(bloco);
  });

      <textarea class="pixcode" id="pixTa" readonly>${pixSel.payload}</textarea>
      <div class="pixbtns">
        <button class="ckb" id="bCopy">Copiar código</button>
        <button class="ckb ok2" id="bPaguei">Já paguei</button>
        <button class="mini-btn ghost" id="bPixNo">Cancelar</button>
      </div></div>`;
  } else {
    inner+=`<div class="pacs">`+CORE.PACOTES.map(pc=>
      `<button class="pac" data-p="${pc.id}">${GEMA}<b>${pc.ambar}</b><small>R$ ${pc.preco.toFixed(2).replace(".",",")}</small></button>`).join("")+`</div>`;
  }
  amb.innerHTML=inner; v.appendChild(amb);

  if(!pend&&!pixSel) amb.querySelectorAll(".pac").forEach(b=>b.onclick=()=>{
    if(!db.config||!db.config.pixChave)
      return modal("Pix ainda não configurado","O gestor ainda não cadastrou a chave Pix. Fala com ele.",[{t:"Ok",c:"ghost",f:closeModal}]);
    const pc=CORE.PACOTES.find(x=>x.id===b.dataset.p);
    const txid="MD"+Math.random().toString(36).slice(2,10).toUpperCase();
    pixSel={pacoteId:pc.id,txid,payload:CORE.pixPayload(db.config,pc.preco,txid)};

      if(navigator.clipboard&&navigator.clipboard.writeText)

    };
    $("#bPixNo").onclick=()=>{ pixSel=null; vLoja(); };
  }
  rail();
}

      r.innerHTML=`<div class="pos">${i<3?["🥇","🥈","🥉"][i]:i+1}</div>
        <div class="av${mold(u)}">${u.foto?`<img src="${u.foto}" alt="">`:esc(u.nome.trim()[0]||"?").toUpperCase()}</div>
        <div class="info"><div class="ninline"><b class="nm${nomeEq(u.equip)}">${esc(u.nome)}</b>${flair(u)}${u.id===me.id?'<span class="vc">(você)</span>':""}</div><small>${titEq(u)?'<span class="tit">'+esc(titEq(u).nome)+"</span>":esc(c?c.nome:"—")+(u.pro?" · Pro":"")}</small></div>
        <div class="xp">${u.xp}</div>`;
      v.appendChild(r);
    });
    v.appendChild(el("div",null,'<div style="color:var(--muted);font-size:11.5px;text-align:center;padding:14px;font-family:var(--ff-m)">Ranking por XP acumulado</div>'));
  };
  draw(); rail();
}

function vPerfil(){
  const v=$("#view"); v.innerHTML="";
  const c=db.cursos[me.cursoId];
  const mats=CORE.materiasDe(db,me);
  v.innerHTML=`
    <div class="prof-head">
      <div class="prof-av${mold(me)}">${me.foto?`<img src="${me.foto}" alt="">`:esc(me.nome.trim()[0]||"?").toUpperCase()}</div>
      <div><div class="ninline"><b class="nm${nomeEq(me.equip)}">${esc(me.nome)}</b>${flair(me)}</div><small>${esc(me.email)}</small><br><small>${titEq(me)?'<span class="tit">'+esc(titEq(me).nome)+"</span>":esc(c?c.nome:"—")}</small></div>
    </div>
    ${me.pro?`<div class="pro-banner"><b>Modus Pro ativo</b><p>Você tem acesso a todo o conteúdo Pro liberado nas suas matérias.</p></div>`:
      `<div class="pro-banner"><b>Modus Pro</b><p>Libera as lições marcadas com PRO. Peça ao gestor ou assine quando o checkout existir.</p></div>`}
    <div class="gr">
      <div class="st"><b class="a">${me.xp}</b><small>XP total</small></div>
      <div class="st"><b>${me.streak}</b><small>Dias seguidos</small></div>
      <div class="st"><b>${me.resp?Math.round(me.certo/me.resp*100)+"%":"—"}</b><small>Acerto</small></div>
      <div class="st"><b>${me.melhor}</b><small>Melhor seq.</small></div>
    </div>
    <div class="foto-row">
      <button class="mini-btn" id="bFoto">${me.foto?"Trocar foto":"Adicionar foto"}</button>
      ${me.foto?`<button class="mini-btn ghost" id="bFotoDel">Remover</button>`:""}
      <input type="file" id="fotoIn" accept="image/*" class="hide">
    </div>
    <div class="card"><h3>Matérias liberadas</h3><div id="accs"></div></div>
    <button class="btn ghost" id="bOut2">Sair da conta</button>`;
  const a=$("#accs");
  if(!mats.length) a.innerHTML='<div style="color:var(--muted);font-size:13px">Nenhuma matéria liberada.</div>';
  mats.forEach(m=>{
    const nPro=m.unidades.flatMap(u=>u.licoes).filter(l=>l.plano==="pro").length;
    const d=el("div","acc");
    d.innerHTML=`<div class="d${nPro&&!me.pro?" p":""}"></div><b>${esc(m.nome)}</b><span>${nPro?nPro+" pro":"liberada"}</span>`;
    a.appendChild(d);
  });
  $("#bFoto").onclick=()=>$("#fotoIn").click();
  $("#fotoIn").onchange=ev=>{
    const f=ev.target.files&&ev.target.files[0]; if(!f) return;
    const img=new Image();
    img.onload=()=>{
      const S=128, cv=document.createElement("canvas"); cv.width=S; cv.height=S;
      const cx=cv.getContext("2d");
      const sq=Math.min(img.width,img.height);
      cx.drawImage(img,(img.width-sq)/2,(img.height-sq)/2,sq,sq,0,0,S,S);
      URL.revokeObjectURL(img.src);
      me.foto=cv.toDataURL("image/jpeg",.82);
      CORE.save(db); vPerfil();
    };
    img.onerror=()=>{ URL.revokeObjectURL(img.src);
      modal("Não deu","Não consegui ler essa imagem. Tenta outro arquivo.",[{t:"Ok",f:closeModal}]); };
    img.src=URL.createObjectURL(f);
  };
  if(me.foto&&$("#bFotoDel")) $("#bFotoDel").onclick=()=>{ me.foto=null; CORE.save(db); vPerfil(); };
  $("#bOut2").onclick=()=>modal("Sair da conta?","Você vai precisar entrar de novo.",
    [{t:"Sair",c:"warn",f:()=>{closeModal();CORE.clearSession();goAuth();}},{t:"Cancelar",c:"ghost",f:closeModal}]);
  rail();
}

/* ============ MOTOR DE LIÇÃO ============ */
let L=null,ix=0,cur=null,st=null,checked=false,seq=0,ses=null;
function abrir(l){
  CORE.regenVidas(me); CORE.save(db); hud();
  if(me.hearts<=0) return modal("Sem vidas",msgVida(),[{t:"Entendi",c:"ghost",f:closeModal}]);
  L=l; ix=0; seq=0; ses={certo:0,total:0,xp:0,melhor:0};
  $("#stage").classList.add("on"); document.body.style.overflow="hidden"; render();
}
$("#btnX").onclick=()=>modal("Sair da lição?","Seu progresso nesta lição será perdido.",
  [{t:"Sair",c:"warn",f:()=>{closeModal();$("#stage").classList.remove("on");document.body.style.overflow="";hud();paint();}},
   {t:"Continuar estudando",c:"ghost",f:closeModal}]);

const KICK={escolha:"Escolha a alternativa",vf:"Verdadeiro ou falso",classificar:"Classifique cada item",
  associar:"Associe os pares",lacuna:"Complete as lacunas",ordenar:"Coloque na ordem certa",calculo:"Calcule"};
function render(){
  cur=L.ex[ix]; checked=false; st=null;
  $("#pbar").style.width=(ix/L.ex.length*100)+"%";
  $("#fb").className="fb";
  const c=$("#cta"); c.className="cta"; c.textContent="Verificar"; c.disabled=true; c.onclick=verificar;
  const b=$("#qbody"); b.innerHTML=""; b.scrollTop=0;
  b.appendChild(el("div","q-k",KICK[cur.t]||"Questão"));
  b.appendChild(el("div","q-t",cur.p));
  R[cur.t](b);
}
const R={};
R.escolha=b=>{
  const box=el("div","opts");
  const ordem=cur.o.map((_,i)=>i).sort(()=>Math.random()-.5); cur._o=ordem;
  ordem.forEach((oi,pos)=>{
    const o=el("button","opt");
    o.innerHTML='<div class="k">'+"ABCD"[pos]+'</div><div>'+cur.o[oi]+"</div>";
    o.onclick=()=>{if(checked)return;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");st=oi;$("#cta").disabled=false;};
    box.appendChild(o);
  });
  b.appendChild(box);
};
R.vf=b=>{
  b.appendChild(el("div","claim",cur.claim));
  const box=el("div","vf");
  [[true,"Verdadeiro",'<path d="M20 6L9 17l-5-5"/>'],[false,"Falso",'<path d="M6 6l12 12M18 6L6 18"/>']].forEach(([v,lab,pt])=>{
    const o=el("button","opt");
    o.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">'+pt+"</svg>"+lab;
    o.dataset.v=v;
    o.onclick=()=>{if(checked)return;box.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel"));o.classList.add("sel");st=v;$("#cta").disabled=false;};
    box.appendChild(o);
  });
  b.appendChild(box);
};
R.classificar=b=>{
  st={}; let armed=null;
  const bs=el("div","buckets");
  cur.b.forEach((nome,bi)=>{
    const k=el("div","bucket"); k.dataset.b=bi;
    k.appendChild(el("h4",null,esc(nome)));
    const d=el("div","drop"); k.appendChild(d);
    k.onclick=()=>{ if(checked||armed===null)return;
      const i=armed; st[i]=bi;
      const chip=document.querySelector('#qbody .tk[data-i="'+i+'"]');
      chip.classList.remove("sel"); chip.classList.add("mini"); d.appendChild(chip); arm(null); ok(); };
    bs.appendChild(k);
  });
  b.appendChild(bs);
  const pool=el("div","pool"); b.appendChild(pool);
  cur.i.map((_,i)=>i).sort(()=>Math.random()-.5).forEach(i=>{
    const c=el("button","tk",esc(cur.i[i].x)); c.dataset.i=i;
    c.onclick=ev=>{ if(checked)return; ev.stopPropagation();
      if(c.classList.contains("mini")){delete st[i];c.classList.remove("mini");pool.appendChild(c);arm(null);ok();}
      else arm(armed===i?null:i); };
    pool.appendChild(c);
  });
  function arm(i){ armed=i;
    pool.querySelectorAll(".tk").forEach(x=>x.classList.toggle("sel",+x.dataset.i===i));
    bs.querySelectorAll(".bucket").forEach(x=>x.classList.toggle("armed",i!==null)); }
  function ok(){ $("#cta").disabled=Object.keys(st).length!==cur.i.length; }
};
R.associar=b=>{
  st={links:0}; let sel=null,n=0;
  const g=el("div","pairs"),L1=el("div","pcol"),L2=el("div","pcol");
  cur.pares.map((p,i)=>({t:p[0],i})).sort(()=>Math.random()-.5).forEach(a=>{const e=el("button","pit",esc(a.t));e.dataset.i=a.i;e.onclick=()=>pick(e,"a");L1.appendChild(e);});
  cur.pares.map((p,i)=>({t:p[1],i})).sort(()=>Math.random()-.5).forEach(a=>{const e=el("button","pit",esc(a.t));e.dataset.i=a.i;e.onclick=()=>pick(e,"b");L2.appendChild(e);});
  g.append(L1,L2); b.appendChild(g);
  function pick(e,side){
    if(checked||e.classList.contains("linked"))return;
    if(!sel){sel={e,side};e.classList.add("sel");return;}
    if(sel.side===side){sel.e.classList.remove("sel");sel={e,side};e.classList.add("sel");return;}
    if(sel.e.dataset.i===e.dataset.i){
      n++;[sel.e,e].forEach(x=>{x.classList.remove("sel");x.classList.add("linked");x.dataset.n=n;});
      st.links=n; buzz(12); if(n===cur.pares.length)$("#cta").disabled=false;
    } else {
      e.classList.add("shake"); sel.e.classList.add("shake");
      const s=sel.e; setTimeout(()=>{s.classList.remove("shake","sel");e.classList.remove("shake")},310);
      st.erro=true; buzz([8,40,8]);
    }
    sel=null;
  }
};
R.lacuna=b=>{
  st=[]; const n=cur.gab.length;
  const f=el("div","frase");
  cur.frase.split(/(\{\d\})/).forEach(p=>{
    const m=p.match(/^\{(\d)\}$/);
    if(m){ const g=el("span","gap","____"); g.dataset.g=m[1];
      g.onclick=()=>{ if(checked||!st[m[1]])return;
        const w=st[m[1]]; st[m[1]]=null; g.textContent="____"; g.classList.remove("full");
        banco.querySelector('[data-w="'+CSS.escape(w)+'"]').classList.remove("gone"); ok(); };
      f.appendChild(g);
    } else f.appendChild(document.createTextNode(p));
  });
  b.appendChild(f);
  const banco=el("div","pool"); b.appendChild(banco);
  cur.banco.slice().sort(()=>Math.random()-.5).forEach(w=>{
    const c=el("button","tk",esc(w)); c.dataset.w=w;
    c.onclick=()=>{ if(checked)return;
      let i=-1; for(let k=0;k<n;k++) if(!st[k]){i=k;break;}
      if(i<0)return;
      st[i]=w; c.classList.add("gone");
      const g=f.querySelector('[data-g="'+i+'"]'); g.textContent=w; g.classList.add("full"); ok(); };
    banco.appendChild(c);
  });
  function ok(){ $("#cta").disabled=st.filter(Boolean).length!==n; }
};
R.ordenar=b=>{
  st=[];
  const box=el("div","seq"); b.appendChild(box);
  const pool=el("div","pool"); b.appendChild(pool);
  cur.seq.slice().sort(()=>Math.random()-.5).forEach(t=>{
    const c=el("button","tk",esc(t)); c.dataset.t=t;
    c.onclick=()=>{if(checked)return;st.push(t);c.classList.add("gone");draw();};
    pool.appendChild(c);
  });
  function draw(){
    box.innerHTML="";
    st.forEach((t,i)=>{
      const r=el("button","sq"); r.innerHTML='<div class="i">'+(i+1)+'</div><div>'+esc(t)+"</div>";
      r.onclick=()=>{if(checked)return;st.splice(i,1);pool.querySelector('[data-t="'+CSS.escape(t)+'"]').classList.remove("gone");draw();};
      box.appendChild(r);
    });
    $("#cta").disabled=st.length!==cur.seq.length;
  }
  draw();
};
R.calculo=b=>{
  st="";
  if(cur.dica) b.appendChild(el("div","dica","<b>Fórmula</b>"+esc(cur.dica)));
  const out=el("div","calc-out");
  out.innerHTML='<div class="v ph" id="cv">0</div>'+(cur.un?'<div class="u">'+esc(cur.un)+"</div>":"");
  b.appendChild(out);
  const pad=el("div","pad");
  ["1","2","3","4","5","6","7","8","9",",","0","⌫"].forEach(k=>{
    const x=el("button",null,k);
    x.onclick=()=>{ if(checked)return; buzz(6);
      if(k==="⌫") st=st.slice(0,-1);
      else if(k===","){ if(!st.includes(","))st=(st||"0")+","; }
      else st+=k;
      const v=$("#cv"); v.textContent=st||"0"; v.classList.toggle("ph",!st);
      $("#cta").disabled=!st||st.endsWith(","); };
    pad.appendChild(x);
  });
  b.appendChild(pad);
};
const V={
  escolha:()=>st===cur.r, vf:()=>st===cur.r,
  classificar:()=>cur.i.every((it,i)=>st[i]===it.b),
  associar:()=>!st.erro,
  lacuna:()=>cur.gab.every((g,i)=>st[i]===g),
  ordenar:()=>st.every((t,i)=>t===cur.seq[i]),
  calculo:()=>Math.abs(parseFloat(String(st).replace(",","."))-cur.r)<=(cur.tol||.01)
};
const PAINT={
  escolha:()=>{const os=$("#qbody").querySelectorAll(".opt");
    cur._o.forEach((oi,pos)=>{ if(oi===cur.r)os[pos].classList.add("right"); else if(oi===st)os[pos].classList.add("wrong"); else os[pos].classList.add("dead"); });},
  vf:()=>{$("#qbody").querySelectorAll(".opt").forEach(o=>{const v=o.dataset.v==="true";
    if(v===cur.r)o.classList.add("right"); else if(v===st)o.classList.add("wrong"); else o.classList.add("dead");});},
  classificar:()=>{$("#qbody").querySelectorAll(".bucket").forEach(k=>{const bi=+k.dataset.b;let all=true;
    k.querySelectorAll(".tk").forEach(c=>{if(cur.i[+c.dataset.i].b!==bi){c.classList.add("bad");all=false;}});
    k.classList.add(all?"right":"wrong");});},
  associar:()=>{},
  lacuna:()=>{$("#qbody").querySelectorAll(".gap").forEach(g=>{const i=+g.dataset.g;
    if(st[i]===cur.gab[i])g.classList.add("right"); else {g.classList.add("wrong");g.textContent=st[i]+" → "+cur.gab[i];}});},
  ordenar:()=>{$("#qbody").querySelectorAll(".sq").forEach((r,i)=>r.classList.add(st[i]===cur.seq[i]?"right":"wrong"));},
  calculo:a=>{const o=$("#qbody").querySelector(".calc-out");o.classList.add(a?"right":"wrong");
    if(!a)$("#cv").textContent=st+"  →  "+String(cur.r).replace(".",",");}
};
function verificar(){
  checked=true;
  const a=V[cur.t](); PAINT[cur.t](a);
  me.resp++; ses.total++;
  if(a){
    me.certo++; ses.certo++; seq++;
    if(seq>ses.melhor)ses.melhor=seq;
    if(seq>me.melhor)me.melhor=seq;
    const g=10+(seq>=3?5:0); me.xp+=g; ses.xp+=g; flut("+"+g); buzz(18);
  } else { seq=0; CORE.perderVida(me); buzz([14,60,14]); }
  CORE.save(db); hud();
  const fb=$("#fb"); fb.className="fb on "+(a?"good":"bad");
  $("#fbIc").innerHTML=a?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
    :'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
  $("#fbT").textContent=a?(seq>=3?"Sequência de "+seq+"!":"Correto"):"Não foi dessa vez";
  $("#fbE").innerHTML=cur.e||"";
  const c=$("#cta"); c.className="cta "+(a?"ok":"no");
  c.textContent=ix+1<L.ex.length?"Continuar":"Finalizar"; c.disabled=false;
  c.onclick=()=>{
    if(me.hearts<=0){ $("#stage").classList.remove("on"); document.body.style.overflow=""; hud(); paint();
      return modal("Suas vidas acabaram","A lição não foi concluída. "+msgVida(),
        [{t:"Entendi",c:"ghost",f:closeModal}]); }
    ix++; if(ix<L.ex.length)render(); else concluir();
  };
}
function flut(t){const f=$("#xpf");f.textContent=t;f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}
function concluir(){
  $("#pbar").style.width="100%";
  CORE.tickStreak(me);
  const acc=Math.round(ses.certo/ses.total*100), perf=acc===100;
  if(perf){me.xp+=20;ses.xp+=20;}
  const ganhoBr = me.done[L.id] ? 5 : 15;
  me.brasas=(me.brasas||0)+ganhoBr;
  me.done[L.id]=true; CORE.save(db);
  pendMerit=CORE.checarMeritos(db,me);
  hud(); paint();
  setTimeout(()=>{
    $("#stage").classList.remove("on");
    $("#dTit").textContent=perf?"Lição perfeita":"Lição concluída";
    $("#dSub").textContent=(perf?"Você acertou tudo em "+L.titulo+". Bônus de 20 XP.":"Você concluiu "+L.titulo+".")+" Você ganhou "+ganhoBr+" Brasas.";
    $("#dXp").textContent="+"+ses.xp; $("#dAcc").textContent=acc+"%"; $("#dSeq").textContent=ses.melhor;
    $("#done").classList.add("on");
  },420);
}
$("#dBtn").onclick=()=>{ $("#done").classList.remove("on"); document.body.style.overflow=""; hud(); paint();
    if(pendMerit&&pendMerit.length){
      const ns=pendMerit.map(i=>i.nome).join(", "); pendMerit=null;
      modal("Insígnia conquistada!","Você ganhou: "+ns+". Isso não se compra: é mérito. Já está no seu inventário, é só equipar na Loja.",
        [{t:"Ver na Loja",c:"amber",f:()=>{closeModal();tab="loja";paint();}},{t:"Depois",c:"ghost",f:closeModal}]);
    } };

/* ============ BOOT ============ */
(function(){
  db=CORE.load();
  const uid=CORE.getSession();
  if(uid&&db.users[uid]){ const u=db.users[uid];
    if(u.role==="gestor"){CORE.clearSession();return goAuth();}
    if(u.status!=="aprovado")return telaEspera(u);
    return entrar(uid);
  }
  goAuth();
})();
</script>
